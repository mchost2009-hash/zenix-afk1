<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zenix AFK Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --bg: oklch(0.08 0.01 240);
      --bg2: oklch(0.11 0.015 240);
      --bg3: oklch(0.14 0.02 240);
      --border: oklch(0.22 0.04 240);
      --primary: oklch(0.62 0.22 240);
      --primary-glow: oklch(0.62 0.22 240 / 0.2);
      --green: oklch(0.72 0.18 155);
      --green-glow: oklch(0.72 0.18 155 / 0.15);
      --yellow: oklch(0.82 0.18 90);
      --red: oklch(0.65 0.22 25);
      --red-glow: oklch(0.65 0.22 25 / 0.15);
      --text: oklch(0.92 0.01 240);
      --text-muted: oklch(0.55 0.03 240);
      --font: 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      padding: 24px 16px;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 20% 20%, oklch(0.62 0.22 240 / 0.05) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 80%, oklch(0.72 0.18 155 / 0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), oklch(0.55 0.22 270));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px var(--primary-glow);
    }

    .header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .header h1 span {
      color: var(--primary);
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--green-glow);
      border: 1px solid oklch(0.72 0.18 155 / 0.3);
      color: var(--green);
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .pulse {
      width: 7px;
      height: 7px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: 1fr; }
    }

    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .stat-card:hover::before { opacity: 1; }
    .stat-card:hover {
      border-color: oklch(0.30 0.05 240);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px oklch(0 0 0 / 0.3);
    }

    .stat-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
    }

    .stat-icon.blue { background: var(--primary-glow); color: var(--primary); }
    .stat-icon.green { background: var(--green-glow); color: var(--green); }
    .stat-icon.yellow { background: oklch(0.82 0.18 90 / 0.12); color: var(--yellow); }

    .stat-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      font-family: var(--mono);
      line-height: 1;
    }

    .stat-value.blue { color: var(--primary); }
    .stat-value.green { color: var(--green); }
    .stat-value.yellow { color: var(--yellow); }

    .stat-sub {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* Log section */
    .log-section {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      margin-top: 12px;
    }

    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .log-header-left {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
    }

    .log-count {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.7rem;
      font-family: var(--mono);
      padding: 2px 8px;
      border-radius: 999px;
    }

    .log-list {
      max-height: 400px;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .log-list::-webkit-scrollbar { width: 4px; }
    .log-list::-webkit-scrollbar-track { background: transparent; }
    .log-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .log-entry {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-family: var(--mono);
      background: var(--bg3);
      border: 1px solid transparent;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .log-entry.ok { border-color: oklch(0.72 0.18 155 / 0.2); }
    .log-entry.reset { border-color: oklch(0.65 0.22 25 / 0.2); background: oklch(0.65 0.22 25 / 0.05); }
    .log-entry.info { border-color: oklch(0.62 0.22 240 / 0.2); }

    .log-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-top: 4px;
      flex-shrink: 0;
    }

    .log-dot.ok { background: var(--green); }
    .log-dot.reset { background: var(--red); }
    .log-dot.info { background: var(--primary); }

    .log-time {
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .log-msg { color: var(--text); flex: 1; }

    /* Footer */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
      padding: 0 4px;
    }

    .updated-text {
      font-size: 0.72rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .refresh-btn {
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 0.75rem;
      font-family: var(--font);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s ease;
    }

    .refresh-btn:hover {
      background: var(--bg3);
      color: var(--text);
      border-color: oklch(0.30 0.05 240);
    }

    .refresh-btn:active { transform: scale(0.95); }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 0.85rem;
      animation: blink 1.5s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="logo">
          <i data-lucide="coins" style="width:20px;height:20px;color:white;"></i>
        </div>
        <h1>Zenix <span>AFK</span> Dashboard</h1>
      </div>
      <div class="status-badge" id="status-badge">
        <div class="pulse"></div>
        <span>Live</span>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon blue">
          <i data-lucide="coins" style="width:16px;height:16px;"></i>
        </div>
        <div class="stat-label">Tổng Coin</div>
        <div class="stat-value blue" id="total">—</div>
        <div class="stat-sub">Tất cả thời gian</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">
          <i data-lucide="trending-up" style="width:16px;height:16px;"></i>
        </div>
        <div class="stat-label">Coin / Giờ</div>
        <div class="stat-value green" id="per_hour">—</div>
        <div class="stat-sub">Tốc độ hiện tại</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon yellow">
          <i data-lucide="calendar" style="width:16px;height:16px;"></i>
        </div>
        <div class="stat-label">Coin Hôm Nay</div>
        <div class="stat-value yellow" id="today">—</div>
        <div class="stat-sub" id="today-date">—</div>
      </div>
    </div>

    <!-- Logs -->
    <div class="log-section">
      <div class="log-header">
        <div class="log-header-left">
          <i data-lucide="terminal" style="width:15px;height:15px;color:var(--primary)"></i>
          Activity Log
          <span class="log-count" id="log-count">0</span>
        </div>
      </div>
      <div class="log-list" id="log-list">
        <div class="loading">⏳ Đang tải dữ liệu...</div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <div class="updated-text">
        <i data-lucide="clock" style="width:12px;height:12px;"></i>
        <span id="updated">Chưa cập nhật</span>
      </div>
      <button class="refresh-btn" onclick="loadStats()">
        <i data-lucide="refresh-cw" style="width:12px;height:12px;"></i>
        Làm mới
      </button>
    </div>

  </div>

  <script>
    lucide.createIcons();

    function parseLog(log) {
      const timeMatch = log.match(/^(\d{2}:\d{2}:\d{2})\s*-\s*(.*)/);
      if (timeMatch) return { time: timeMatch[1], msg: timeMatch[2] };
      return { time: '', msg: log };
    }

    function getLogClass(msg) {
      if (msg.includes('Reset') || msg.includes('❌') || msg.includes('🔄')) return 'reset';
      if (msg.includes('✅') || msg.includes('+') || msg.includes('tăng')) return 'ok';
      return 'info';
    }

    async function loadStats() {
      try {
        const res = await fetch('stats.json?t=' + Date.now());
        if (!res.ok) throw new Error('No data');
        const data = await res.json();

        // Update stats
        document.getElementById('total').textContent = Number(data.total_coins).toLocaleString('vi-VN');
        document.getElementById('per_hour').textContent = data.coins_per_hour ?? '0';
        document.getElementById('today').textContent = Number(data.coins_today).toLocaleString('vi-VN');
        document.getElementById('today-date').textContent = data.today_date ?? '';
        document.getElementById('updated').textContent = 'Cập nhật lúc ' + (data.last_updated ?? '—');
        document.getElementById('log-count').textContent = (data.logs ?? []).length;

        // Update logs
        const logList = document.getElementById('log-list');
        if (!data.logs || data.logs.length === 0) {
          logList.innerHTML = '<div class="empty">Chưa có log nào.</div>';
          return;
        }

        logList.innerHTML = data.logs.map(log => {
          const { time, msg } = parseLog(log);
          const cls = getLogClass(msg);
          return `
            <div class="log-entry ${cls}">
              <div class="log-dot ${cls}"></div>
              ${time ? `<span class="log-time">${time}</span>` : ''}
              <span class="log-msg">${msg}</span>
            </div>`;
        }).join('');

      } catch (e) {
        document.getElementById('log-list').innerHTML =
          '<div class="empty">⚠️ Chưa có dữ liệu. Script chưa chạy lần nào.</div>';
      }

      lucide.createIcons();
    }

    loadStats();
    setInterval(loadStats, 30000);
  </script>
</body>
</html>
